version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: impulsa_local
    #command: sh -c "sleep infinity"
    command: sh -c "./wait-for-it.sh db python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: impulsa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
  
volumes:
  postgres_data: